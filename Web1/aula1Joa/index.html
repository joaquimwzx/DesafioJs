<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript - Exercícios</title>
</head>

<body>
    <h1>JavaScript - Primeiros Passos</h1>

    <h2>1 - Alert</h2>
    <button onclick="alert('Olá mundo!')">Clique aqui</button>

    <h2>2 - document.write()</h2>
    <button onclick="minhaFuncao()">Clique aqui</button>

    <h2>3 - Prompt</h2>
    <button onclick="pergunta()">Clique aqui</button>
    <div id="res1"></div>

    <h2>4 - Input HTML</h2>
    <input id="entrada" placeholder="Digite algo">
    <button onclick="mostrarTexto()">Enviar</button>
    <div id="res2"></div>

    <h2>5 - Somar</h2>
    <input id="num1" placeholder="Número 1">
    <input id="num2" placeholder="Número 2">
    <button onclick="somar()">Somar</button>
    <div id="res3"></div>

    <h2>6 - Média Escolar</h2>
    <input id="nota1" placeholder="Nota 1">
    <input id="nota2" placeholder="Nota 2">
    <input id="nota3" placeholder="Nota 3">
    <button onclick="mediaEscolar()">Calcular</button>
    <div id="res4"></div>

    <h2>7 - Dólar</h2>
    <input id="reais" placeholder="Reais">
    <input id="cotacao" placeholder="Cotação">
    <button onclick="converterDolar()">Converter</button>
    <div id="res5"></div>

    <h2>8 - Área</h2>
    <input id="altura" placeholder="Altura">
    <input id="largura" placeholder="Largura">
    <button onclick="calcularArea()">Calcular</button>
    <div id="res6"></div>

    <h2>9 - Vizinhos</h2>
    <input id="numero" placeholder="Número">
    <button onclick="vizinhos()">Mostrar</button>
    <div id="res7"></div>

    <h2>10 - Par ou Ímpar</h2>
    <input id="numero2" placeholder="Número">
    <button onclick="parOuImpar()">Verificar</button>
    <div id="res8"></div>

    <h2>11 - Radar</h2>
    <input id="velocidade" placeholder="Velocidade">
    <button onclick="radar()">Verificar</button>
    <div id="res9"></div>

    <h2>12 - Habilitação</h2>
    <input id="nascimento" placeholder="Ano nascimento">
    <input id="anoAtual" placeholder="Ano atual">
    <button onclick="habilitacao()">Verificar</button>
    <div id="res10"></div>

    <h2>13 - IMC</h2>
    <input id="peso" placeholder="Peso">
    <input id="altura2" placeholder="Altura">
    <button onclick="calcularIMC()">Calcular</button>
    <div id="res11"></div>

    <h2>14 - Desconto</h2>
    <input id="valorCompra" placeholder="Valor compra">
    <button onclick="calcularDesconto()">Calcular</button>
    <div id="res12"></div>

    <h2>15 - Comparador</h2>
    <input id="numA" placeholder="Número 1">
    <input id="numB" placeholder="Número 2">
    <button onclick="compararNumeros()">Comparar</button>
    <div id="res13"></div>

    <script src="./js/script.js"></script>
</body>

</html>
